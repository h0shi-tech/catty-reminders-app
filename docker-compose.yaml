services:
  db:
    image: mariadb:10.11
    container_name: catty-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mypass
      MYSQL_DATABASE: catty_reminders
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - catty-db-data:/var/lib/mysql

  app:
    image: ${IMAGE:-catty-reminders-app:local}
    container_name: catty-reminders-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8181:8181"
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: mypass
      DB_NAME: catty_reminders

volumes:
  catty-db-data:
