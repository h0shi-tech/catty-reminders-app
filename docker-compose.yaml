name: catty-nikishin

services:
  database:
    image: mariadb:10.11
    container_name: catty-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mypass
      MYSQL_DATABASE: catty_reminders
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 25s
    volumes:
      - catty_mysql_data:/var/lib/mysql

  web:
    image: ${CATTY_IMAGE:-catty-reminders-app:local}
    container_name: catty-reminders-app
    restart: unless-stopped
    pull_policy: always
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8181:8181"
    environment:
      DB_HOST: database
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: mypass
      DB_NAME: catty_reminders

volumes:
  catty_mysql_data:
