name: CI

on:
  push:
    branches:
      - lab2
      - lab2_autotests*
  pull_request:
    branches:
      - lab2
      - lab2_autotests*

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install chromium

      - name: Start application
        env:
          DEPLOY_REF: ${{ github.sha }}
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8181 &
          for i in {1..30}; do
            curl --fail --silent http://127.0.0.1:8181/login >/dev/null && exit 0
            sleep 1
          done
          exit 1

      - name: Run tests
        run: python -m pytest -v --browser chromium --junitxml=test_result.xml tests

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml
