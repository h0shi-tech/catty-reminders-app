name: CD

on:
  release:
    types:
      - published

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest -v tests/test_unit.py

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 3152
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd "${{ secrets.APP_DIR }}"
            APP_DIR="$PWD" APP_ENV_FILE="$PWD/.env" APP_SERVICE=none APP_RESTART_COMMAND="./scripts/restart-local-app.sh" RUN_TESTS=1 ./scripts/deploy.sh lab2 ${{ github.sha }}
